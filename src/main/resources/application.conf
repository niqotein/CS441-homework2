# This is the main configuration block for your application
app {

  # A custom flag to toggle verbose logging or `show()` calls in your Main.scala
  debug = true

  # --- Data Paths ---

  # Path to the input MSRCorpus PDF files.
  # This is the "corpus" your RAG pipeline will index.
  corpusPath = "./MSRCorpus"

  # Path to the output directory where Spark will create and manage
  # the Delta Lake tables (e.g., docs, chunks, embeddings).
  # This is the "delta store" for your incremental indexer (HW2).
  tablePath = "./target/delta-tables"

  # --- RAG Chunking Parameters ---
  # As described in HW1, these values control the "sliding window" for chunking.
  chunker {
      # The target maximum size (in characters) for each text chunk.
      size = 1000
      # The number of characters to overlap between consecutive chunks
      # to maintain semantic context.
      overlap = 100
    }

  # --- Embedding Model Configuration ---
  # Parameters for the Ollama embedding service (HW1).
  embedding {
    # The name of the embedding model to use from Ollama (e.g., "mxbai-embed-large").
    model = "mxbai-embed-large"

    # A version string for the model. This is critical for HW2's
    # delta-aware embedding logic. Changing this version will trigger
    # a re-embedding of all chunks, as the pipeline will see they
    # are missing embeddings for this specific version.
    version = "1.3.0"

    # The base URL for the Ollama server's API.
    ollamaHost = "http://localhost:11434"
  }
}